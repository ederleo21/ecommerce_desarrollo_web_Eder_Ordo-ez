<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Store | Premium Electronics</title>
    <link rel="stylesheet" href="css/estilos.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">AURA<span>STORE</span></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" class="active">Tienda</a></li>
                    <li><a href="carrito.html" class="cart-link">
                        Carrito <span id="cart-count">0</span>
                    </a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Tecnología que inspira.</h1>
                <p>Descubre nuestra colección exclusiva de accesorios minimalistas.</p>
                <a href="#productos" class="btn-primary">Ver Catálogo</a>
            </div>
        </section>

        <section id="productos" class="products container">
            <h2 class="section-title">Productos Destacados</h2>
            <div id="product-grid" class="grid">
                <!-- Los productos se cargarán dinámicamente con JS -->
                <div class="loading">Cargando productos...</div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Aura Store. Diseñado con estilo.</p>
        </div>
    </footer>

    <script src="js/main.js" type="module"></script>
</body>
</html>
